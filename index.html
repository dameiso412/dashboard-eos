<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard EOS - Visión Ejecutiva</title>
    <style>
        /* ===== VARIABLES ===== */
        :root {
            --bg: #0f1117;
            --card: #1a1d27;
            --card-hover: #222632;
            --border: #2a2e3a;
            --text: #e4e6eb;
            --text-muted: #8b8fa3;
            --green: #00c853;
            --green-bg: rgba(0,200,83,.12);
            --red: #ff3d57;
            --red-bg: rgba(255,61,87,.12);
            --yellow: #ffab00;
            --yellow-bg: rgba(255,171,0,.12);
            --blue: #2979ff;
            --blue-bg: rgba(41,121,255,.12);
            --purple: #7c4dff;
            --gold: #ffd700;
            --gradient-green: linear-gradient(135deg, #00c853, #00e676);
            --gradient-red: linear-gradient(135deg, #ff3d57, #ff6b81);
            --gradient-blue: linear-gradient(135deg, #2979ff, #448aff);
            --gradient-purple: linear-gradient(135deg, #7c4dff, #b388ff);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, #1a1d27 0%, #252838 100%);
            border-bottom: 1px solid var(--border);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header-left h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #a0a4b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-left .date { color: var(--text-muted); font-size: 13px; margin-top: 2px; }
        .header-nav { display: flex; align-items: center; gap: 16px; }
        .nav-group { display: flex; align-items: center; gap: 6px; }
        .nav-group label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
        .nav-btn {
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            width: 30px; height: 30px; border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 14px;
            transition: background .2s;
        }
        .nav-btn:hover { background: var(--card-hover); }
        .nav-current {
            background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(41,121,255,.3);
            padding: 4px 14px; border-radius: 8px; font-size: 13px; font-weight: 600;
            min-width: 70px; text-align: center;
        }
        .header-actions { display: flex; gap: 8px; }
        .icon-btn {
            background: var(--card); border: 1px solid var(--border); color: var(--text-muted);
            width: 36px; height: 36px; border-radius: 10px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 16px;
            transition: all .2s;
        }
        .icon-btn:hover { background: var(--card-hover); color: var(--text); }

        /* ===== LAYOUT ===== */
        .dashboard { max-width: 1440px; margin: 0 auto; padding: 28px 40px; }
        .section { margin-bottom: 36px; }
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 18px;
        }
        .section-title {
            font-size: 17px; font-weight: 700;
            display: flex; align-items: center; gap: 10px;
        }
        .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--green); animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        .add-btn {
            background: var(--card); border: 1px solid var(--border); color: var(--blue);
            padding: 6px 14px; border-radius: 10px; cursor: pointer;
            font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 4px;
            transition: all .2s;
        }
        .add-btn:hover { background: var(--blue-bg); border-color: rgba(41,121,255,.3); }

        /* ===== EDIT BUTTONS ===== */
        .editable { position: relative; cursor: pointer; }
        .edit-icon {
            position: absolute; top: 10px; right: 10px;
            width: 28px; height: 28px; border-radius: 8px;
            background: rgba(255,255,255,.06); border: 1px solid transparent;
            color: var(--text-muted); font-size: 13px;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: all .2s; cursor: pointer;
        }
        .editable:hover .edit-icon { opacity: 1; }
        .edit-icon:hover { background: var(--blue-bg); color: var(--blue); border-color: rgba(41,121,255,.3); }
        .delete-icon {
            position: absolute; top: 10px; right: 42px;
            width: 28px; height: 28px; border-radius: 8px;
            background: rgba(255,255,255,.06); border: 1px solid transparent;
            color: var(--text-muted); font-size: 13px;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: all .2s; cursor: pointer;
        }
        .editable:hover .delete-icon { opacity: 1; }
        .delete-icon:hover { background: var(--red-bg); color: var(--red); border-color: rgba(255,61,87,.3); }

        /* ===== PULSO GRID ===== */
        .pulso-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
        .pulso-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 16px;
            padding: 22px; transition: transform .2s, box-shadow .2s;
        }
        .pulso-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,.3); }
        .pulso-card .label {
            font-size: 12px; color: var(--text-muted); margin-bottom: 8px;
            text-transform: uppercase; letter-spacing: .5px;
        }
        .pulso-card .value-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 14px; }
        .pulso-card .value { font-size: 34px; font-weight: 800; }
        .pulso-card .meta { font-size: 14px; color: var(--text-muted); }
        .progress-bar {
            width: 100%; height: 10px; background: rgba(255,255,255,.06);
            border-radius: 10px; overflow: hidden;
        }
        .progress-fill { height: 100%; border-radius: 10px; transition: width 1s ease; }
        .progress-info {
            display: flex; justify-content: space-between; margin-top: 6px;
            font-size: 12px; color: var(--text-muted);
        }

        /* ===== HIDDEN CARDS ===== */
        .pulso-card .visibility-btn {
            position: absolute; top: 10px; right: 10px;
            background: none; border: none; cursor: pointer;
            font-size: 16px; opacity: 0; transition: opacity .2s;
            padding: 4px; border-radius: 6px; color: var(--text-muted);
        }
        .pulso-card { position: relative; }
        .pulso-card:hover .visibility-btn { opacity: 1; }
        .pulso-card.hidden-card .card-content {
            filter: blur(12px); pointer-events: none; user-select: none;
        }
        .pulso-card.hidden-card .hidden-overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 2;
            border-radius: 16px; cursor: pointer;
        }
        .pulso-card.hidden-card .hidden-overlay span {
            font-size: 13px; color: var(--text-muted); margin-top: 4px;
        }
        .pulso-card.hidden-card .visibility-btn { opacity: 1; z-index: 3; }

        /* ===== ROCKS ===== */
        .rocks-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 12px; }
        .rock-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 14px;
            padding: 18px; position: relative; overflow: hidden;
        }
        .rock-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
        }
        .rock-card.on-track::before { background: var(--gradient-green); }
        .rock-card.off-track::before { background: var(--gradient-red); }
        .rock-card .rock-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; padding-right: 70px; }
        .rock-card .rock-owner { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
        .rock-card .rock-progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .rock-card .rock-progress-pct { font-size: 13px; font-weight: 700; min-width: 36px; }
        .rock-card .rock-deadline { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
        .rock-card .milestones { margin-top: 8px; }
        .rock-card .milestone {
            font-size: 12px; color: var(--text-muted); padding: 2px 0;
            display: flex; align-items: center; gap: 6px;
        }
        .rock-card .milestone.done { text-decoration: line-through; opacity: .6; }
        .status-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
        }
        .status-badge.on-track { background: var(--green-bg); color: var(--green); }
        .status-badge.off-track { background: var(--red-bg); color: var(--red); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-dot.green { background: var(--green); }
        .status-dot.red { background: var(--red); }

        /* ===== SCORECARD ===== */
        .table-wrapper { overflow-x: auto; border-radius: 16px; }
        .scorecard-table {
            width: max-content; min-width: 100%; border-collapse: separate; border-spacing: 0;
            background: var(--card); border-radius: 16px; overflow: hidden;
            border: 1px solid var(--border);
        }
        .scorecard-table thead th {
            background: rgba(255,255,255,.04); padding: 12px 14px; text-align: center;
            font-size: 11px; text-transform: uppercase; letter-spacing: .4px;
            color: var(--text-muted); font-weight: 600; border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        .scorecard-table thead th.sticky { position: sticky; z-index: 3; background: #1e2130; text-align: left; }
        .scorecard-table thead th.col-num { left: 0; min-width: 36px; }
        .scorecard-table thead th.col-metric { left: 36px; min-width: 170px; }
        .scorecard-table thead th.col-owner { left: 206px; min-width: 90px; }
        .scorecard-table thead th.col-goal { left: 296px; min-width: 80px; }
        .scorecard-table thead th.col-week { min-width: 44px; cursor: pointer; }
        .scorecard-table thead th.col-week:hover { color: var(--blue); }
        .scorecard-table thead th.current-week { color: var(--blue); background: var(--blue-bg); }
        .scorecard-table thead th.col-total { min-width: 60px; }
        .scorecard-table tbody td {
            padding: 11px 14px; font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,.03);
        }
        .scorecard-table tbody td.sticky { position: sticky; z-index: 2; background: var(--card); }
        .scorecard-table tbody td.col-num { left: 0; min-width: 36px; color: var(--text-muted); }
        .scorecard-table tbody td.col-metric { left: 36px; min-width: 170px; font-weight: 500; }
        .scorecard-table tbody td.col-owner { left: 206px; min-width: 90px; color: var(--text-muted); }
        .scorecard-table tbody td.col-goal { left: 296px; min-width: 80px; color: var(--text-muted); }
        .scorecard-table tbody tr:hover td { background: rgba(255,255,255,.02); }
        .scorecard-table tbody tr:hover td.sticky { background: var(--card-hover); }
        .scorecard-table tbody tr:last-child td { border-bottom: none; }
        .week-cell {
            text-align: center; cursor: pointer; font-size: 16px; transition: background .15s;
        }
        .week-cell:hover { background: rgba(255,255,255,.05) !important; }
        .week-cell.hit { color: var(--green); }
        .week-cell.miss { color: var(--red); }
        .week-cell.empty { color: rgba(255,255,255,.1); font-size: 12px; }
        .week-cell.current-week-col { background: rgba(41,121,255,.05); }
        .total-cell { text-align: center; font-weight: 600; font-size: 12px; }
        .metric-name-link { cursor: pointer; }
        .metric-name-link:hover { color: var(--blue); }

        /* ===== LEADERBOARD ===== */
        .leaderboard-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
        .team-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 16px;
            padding: 22px; text-align: center; position: relative; overflow: hidden;
            transition: transform .2s, box-shadow .2s;
        }
        .team-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,.3); }
        .team-card .rank {
            position: absolute; top: 12px; left: 14px;
            font-size: 13px; font-weight: 700; color: var(--text-muted);
        }
        .team-card .rank.first { color: var(--gold); }
        .avatar {
            width: 68px; height: 68px; border-radius: 50%; margin: 0 auto 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; font-weight: 700; color: #fff;
        }
        .team-card .name { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
        .team-card .role { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }
        .team-card .metric-label {
            font-size: 11px; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px;
        }
        .team-card .metric-value { font-size: 26px; font-weight: 800; margin-bottom: 12px; }
        .team-card .progress-bar { margin-bottom: 6px; }
        .bonus-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 700;
            margin-top: 12px;
        }
        .bonus-badge.secured { background: var(--green-bg); color: var(--green); }
        .bonus-badge.at-risk { background: var(--red-bg); color: var(--red); }

        /* ===== AVATAR PHOTO ===== */
        .avatar { position: relative; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .avatar .level-ring {
            position: absolute; inset: -3px; border-radius: 50%;
            border: 3px solid var(--blue); pointer-events: none;
        }
        .avatar .level-ring.gold { border-color: var(--gold); }
        .avatar .level-ring.green { border-color: var(--green); }
        .avatar .level-ring.purple { border-color: var(--purple); }

        /* ===== STREAKS & BADGES ===== */
        .streak-badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700;
            background: var(--yellow-bg); color: var(--yellow);
        }
        .xp-bar {
            width: 100%; height: 6px; background: rgba(255,255,255,.06);
            border-radius: 6px; overflow: hidden; margin: 6px 0;
        }
        .xp-fill { height: 100%; border-radius: 6px; background: var(--gradient-purple); transition: width 1s ease; }
        .level-badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: 700;
            background: var(--purple); color: #fff; margin-top: 4px;
        }
        .team-card .badges-row {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 4px; margin-top: 8px;
        }
        .mini-badge {
            width: 24px; height: 24px; border-radius: 6px; display: flex;
            align-items: center; justify-content: center; font-size: 12px;
            background: rgba(255,255,255,.06); cursor: default;
        }
        .mini-badge[title]:hover { transform: scale(1.2); }

        /* ===== CARD THEMES (SKINS) ===== */
        .team-card.skin-fire { background: linear-gradient(145deg, #1a1d27, #2a1a1a); border-color: rgba(255,61,87,.3); }
        .team-card.skin-fire::after {
            content:''; position:absolute; inset:0; border-radius:16px; pointer-events:none;
            background: radial-gradient(ellipse at bottom, rgba(255,100,50,.08) 0%, transparent 60%);
        }
        .team-card.skin-ocean { background: linear-gradient(145deg, #1a1d27, #1a2233); border-color: rgba(41,121,255,.3); }
        .team-card.skin-ocean::after {
            content:''; position:absolute; inset:0; border-radius:16px; pointer-events:none;
            background: radial-gradient(ellipse at top, rgba(41,121,255,.06) 0%, transparent 60%);
        }
        .team-card.skin-galaxy { background: linear-gradient(145deg, #1a1025, #0f1117); border-color: rgba(124,77,255,.3); }
        .team-card.skin-galaxy::after {
            content:''; position:absolute; inset:0; border-radius:16px; pointer-events:none;
            background: radial-gradient(ellipse at center, rgba(124,77,255,.08) 0%, transparent 50%);
        }
        .team-card.skin-gold {
            background: linear-gradient(145deg, #1a1d27, #2a2517);
            border-color: rgba(255,215,0,.35);
            box-shadow: 0 0 20px rgba(255,215,0,.06);
        }
        .team-card.skin-gold::after {
            content:''; position:absolute; inset:0; border-radius:16px; pointer-events:none;
            background: radial-gradient(ellipse at top, rgba(255,215,0,.06) 0%, transparent 50%);
        }
        .team-card.skin-emerald { background: linear-gradient(145deg, #1a1d27, #1a2a1f); border-color: rgba(0,200,83,.3); }
        .team-card.skin-emerald::after {
            content:''; position:absolute; inset:0; border-radius:16px; pointer-events:none;
            background: radial-gradient(ellipse at bottom right, rgba(0,200,83,.06) 0%, transparent 50%);
        }
        .team-card.skin-diamond {
            background: linear-gradient(145deg, #1a2030, #0f1520);
            border: 1px solid rgba(150,200,255,.25);
            animation: diamondShimmer 3s ease infinite;
        }
        @keyframes diamondShimmer {
            0%,100% { box-shadow: 0 0 15px rgba(150,200,255,.05); }
            50% { box-shadow: 0 0 25px rgba(150,200,255,.12); }
        }

        /* ===== CUSTOM TITLE ===== */
        .custom-title {
            font-size: 11px; font-weight: 600; margin-top: 2px; margin-bottom: 6px;
            font-style: italic;
        }

        /* ===== REWARDS GRID IN MODAL ===== */
        .rewards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
        .reward-card {
            background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
            padding: 10px; text-align: center; cursor: pointer; transition: all .2s;
            position: relative;
        }
        .reward-card:hover { border-color: var(--blue); }
        .reward-card.locked { opacity: .4; cursor: not-allowed; }
        .reward-card.equipped { border-color: var(--green); background: var(--green-bg); }
        .reward-card .reward-icon { font-size: 22px; margin-bottom: 4px; }
        .reward-card .reward-name { font-size: 12px; font-weight: 600; }
        .reward-card .reward-req { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
        .reward-card .reward-lock { font-size: 14px; position: absolute; top: 6px; right: 6px; }
        .reward-card .equipped-check { font-size: 14px; position: absolute; top: 6px; right: 6px; color: var(--green); }

        /* ===== WEEKLY MVP ===== */
        .mvp-banner {
            background: linear-gradient(135deg, rgba(255,215,0,.08), rgba(255,171,0,.05));
            border: 1px solid rgba(255,215,0,.2); border-radius: 14px;
            padding: 16px 22px; margin-bottom: 18px;
            display: flex; align-items: center; gap: 16px;
        }
        .mvp-banner .mvp-avatar {
            width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 700; color: #fff; flex-shrink: 0;
            overflow: hidden;
        }
        .mvp-banner .mvp-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .mvp-banner .mvp-info { flex: 1; }
        .mvp-banner .mvp-title { font-size: 14px; font-weight: 700; color: var(--gold); }
        .mvp-banner .mvp-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .mvp-banner .mvp-trophy { font-size: 28px; }

        /* ===== FAME WALL ===== */
        .fame-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 18px; flex-wrap: wrap; gap: 10px;
        }
        .fame-stats { display: flex; gap: 12px; align-items: center; }
        .fame-bonus {
            background: linear-gradient(135deg, rgba(255,215,0,.1), rgba(255,171,0,.1));
            border: 1px solid rgba(255,215,0,.25); padding: 6px 16px;
            border-radius: 12px; font-size: 13px; color: var(--gold); font-weight: 600;
        }
        .fame-criteria {
            font-size: 12px; color: var(--text-muted); margin-bottom: 14px;
        }
        .fame-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 14px;
        }
        .fame-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 14px;
            padding: 18px; text-align: center; transition: transform .2s, box-shadow .2s;
            position: relative;
        }
        .fame-card:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,.3); }
        .fame-card.new-entry {
            border-color: rgba(255,215,0,.3);
            animation: glowGold 2s infinite alternate;
        }
        @keyframes glowGold {
            from { box-shadow: 0 0 5px rgba(255,215,0,.1); }
            to { box-shadow: 0 0 20px rgba(255,215,0,.15); }
        }
        .fame-card .new-tag {
            position: absolute; top: 8px; right: 8px;
            background: linear-gradient(135deg, #ffd700, #ffab00);
            color: #000; font-size: 9px; font-weight: 800;
            padding: 2px 8px; border-radius: 10px; text-transform: uppercase;
        }
        .fame-logo {
            width: 56px; height: 56px; border-radius: 12px;
            background: rgba(255,255,255,.06); margin: 0 auto 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: 800; color: var(--text-muted);
        }
        .fame-card .client-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
        .fame-metrics { display: flex; justify-content: center; gap: 14px; margin-top: 8px; }
        .fame-metric { text-align: center; }
        .fm-value { font-size: 13px; font-weight: 700; color: var(--green); }
        .fm-label { font-size: 10px; color: var(--text-muted); }

        /* ===== MODAL ===== */
        .modal-overlay {

<script>
// =====================================================================

const DEFAULT_STATE = {

function getDefaultQuarter() {

}

function getSeedQuarter() {
    return {

        },
        rocks: [
            { id: "r1", name: "Lanzar 3 nuevos verticales de servicio", ownerId: "tomas", status: "on-track", progress: 70, deadline: "2026-03-31", milestones: [{ text: "Investigación de mercado", done: true }, { text: "MVP listo", done: true }, { text: "Lanzamiento público", done: false }] },
            { id: "r2", name: "Alcanzar NRR del 110%", ownerId: "nicolas", status: "on-track", progress: 80, deadline: "2026-03-31", milestones: [{ text: "Identificar cuentas clave", done: true }, { text: "Ejecutar plan de upsell", done: true }, { text: "Cerrar expansiones Q1", done: false }] },
            { id: "r3", name: "Reducir churn rate al 3%", ownerId: "roberto", status: "off-track", progress: 45, deadline: "2026-03-31", milestones: [{ text: "Análisis de razones de churn", done: true }, { text: "Implementar alertas tempranas", done: false }, { text: "Programa de retención", done: false }] }
        ],

                { id: "m1", metric: "Facturación semanal", ownerId: "tomas", goal: "$25,000", direction: "gte" },

                { id: "m3", metric: "Tasa de conversión de leads", ownerId: "christian", goal: "25%", direction: "gte" },
                { id: "m4", metric: "ROAS promedio clientes", ownerId: "christian", goal: "4.0x", direction: "gte" },
                { id: "m5", metric: "NRR (Net Revenue Retention)", ownerId: "nicolas", goal: "105%", direction: "gte" },

                { id: "m10", metric: "Propuestas enviadas", ownerId: "tomas", goal: "10", direction: "gte" },
                { id: "m11", metric: "Costo de adquisición (CAC)", ownerId: "christian", goal: "$800", direction: "lte" },
                { id: "m12", metric: "Satisfacción del cliente (NPS)", ownerId: "roberto", goal: "70", direction: "gte" },

            ],
            weeks: {
                "12": {
                    "m1": { result: "$27,300", good: true }, "m2": { result: "18", good: true },
                    "m3": { result: "22%", good: false }, "m4": { result: "4.3x", good: true },

// =====================================================================
// ===== SUPABASE LAYER =====
// =====================================================================
let supabase = null;
let syncStatus = 'offline'; // 'connected', 'offline', 'syncing', 'error'
let savePending = null;

function getSupabaseConfig() {
    const url = localStorage.getItem('eos_supabase_url') || '';
    const key = localStorage.getItem('eos_supabase_key') || '';
    return { url, key };
}

function setSupabaseConfig(url, key) {
    localStorage.setItem('eos_supabase_url', url);
    localStorage.setItem('eos_supabase_key', key);
    initSupabase();
}

function initSupabase() {
    const { url, key } = getSupabaseConfig();
    if (!url || !key || typeof window.supabase === 'undefined') {
        supabase = null;
        syncStatus = 'offline';
        return;
    }
    try {
        supabase = window.supabase.createClient(url, key);
        syncStatus = 'connected';
        // Try initial cloud load
        loadFromCloud();
    } catch (e) {
        console.error('Supabase init error:', e);
        supabase = null;
        syncStatus = 'error';
    }
}

async function loadFromCloud() {
    if (!supabase) return false;
    try {
        syncStatus = 'syncing';
        updateSyncUI();
        const qk = getQuarterKey(state.currentYear, state.currentQuarter);

        // Load all tables in parallel
        const [configRes, membersRes, pulsoRes, rocksRes, metricsRes, resultsRes, lbRes, fameRes] = await Promise.all([
            supabase.from('dashboard_config').select('*').eq('id', 'main').single(),
            supabase.from('team_members').select('*'),
            supabase.from('pulso').select('*').eq('quarter_key', qk).maybeSingle(),
            supabase.from('rocks').select('*').eq('quarter_key', qk),
            supabase.from('scorecard_metrics').select('*').eq('quarter_key', qk).order('sort_order'),
            supabase.from('scorecard_results').select('*'),
            supabase.from('leaderboard_entries').select('*').eq('quarter_key', qk),
            supabase.from('fame_wall').select('*').eq('quarter_key', qk)
        ]);

        // Check for critical errors
        if (membersRes.error) throw membersRes.error;

        // Assemble state from tables
        if (configRes.data) {
            state.currentYear = configRes.data.current_year;
            state.currentQuarter = configRes.data.current_quarter;
            state.currentWeek = configRes.data.current_week;
        }
        if (membersRes.data && membersRes.data.length > 0) {
            state.settings.teamMembers = membersRes.data.map(m => ({
                id: m.id, name: m.name, role: m.role || '', avatar: m.avatar || '', color: m.color || '#2979ff'
            }));
        }

        const qd = getQuarterData();
        if (pulsoRes.data) {
            qd.pulso.revenueMonthly = { current: Number(pulsoRes.data.revenue_current), goal: Number(pulsoRes.data.revenue_goal) };
            qd.pulso.utilityQuarterly = { current: Number(pulsoRes.data.utility_current), goal: Number(pulsoRes.data.utility_goal) };
        }
        if (rocksRes.data) {
            qd.rocks = rocksRes.data.map(r => ({
                id: r.id, name: r.name, ownerId: r.owner_id, status: r.status,
                progress: r.progress, deadline: r.deadline,
                milestones: typeof r.milestones === 'string' ? JSON.parse(r.milestones) : (r.milestones || [])
            }));
        }
        if (metricsRes.data) {
            qd.scorecard.metrics = metricsRes.data.map(m => ({
                id: m.id, metric: m.metric, ownerId: m.owner_id, goal: m.goal || '', direction: m.direction || 'gte'
            }));
        }
        if (resultsRes.data) {
            qd.scorecard.weeks = {};
            // Filter results to metrics that belong to this quarter
            const metricIds = new Set((metricsRes.data || []).map(m => m.id));
            resultsRes.data.filter(r => metricIds.has(r.metric_id)).forEach(r => {
                if (!qd.scorecard.weeks[r.week]) qd.scorecard.weeks[r.week] = {};
                qd.scorecard.weeks[r.week][r.metric_id] = { result: r.result, good: r.good };
            });
        }
        if (lbRes.data) {
            qd.leaderboard = {};
            lbRes.data.forEach(lb => {
                qd.leaderboard[lb.member_id] = {
                    metricLabel: lb.metric_label || '', metricValue: lb.metric_value || '',
                    progress: lb.progress || 0, goal: lb.goal || ''
                };
            });
        }
        if (fameRes.data) {
            qd.fameWall = fameRes.data.map(f => ({
                id: f.id, name: f.name, initials: f.initials,
                retentionMonths: f.retention_months, roas: Number(f.roas),
                addedDate: f.added_date
            }));
        }

        localStorage.setItem('eos_dashboard', JSON.stringify(state));
        renderAll();
        syncStatus = 'connected';
        updateSyncUI();
        return true;
    } catch (e) {
        console.error('Cloud load error:', e);
        syncStatus = 'error';
        updateSyncUI();
        return false;
    }
}

async function saveToCloud() {
    if (!supabase) return;
    try {
        syncStatus = 'syncing';
        updateSyncUI();
        const qk = getQuarterKey(state.currentYear, state.currentQuarter);
        const qd = getQuarterData();

        // Save config
        await supabase.from('dashboard_config').upsert({
            id: 'main', current_year: state.currentYear,
            current_quarter: state.currentQuarter, current_week: state.currentWeek
        }, { onConflict: 'id' });

        // Save team members
        if (state.settings.teamMembers.length > 0) {
            await supabase.from('team_members').upsert(
                state.settings.teamMembers.map(m => ({
                    id: m.id, name: m.name, role: m.role, avatar: m.avatar, color: m.color
                })), { onConflict: 'id' }
            );
        }

        // Save pulso
        await supabase.from('pulso').upsert({
            quarter_key: qk,
            revenue_current: qd.pulso.revenueMonthly.current,
            revenue_goal: qd.pulso.revenueMonthly.goal,
            utility_current: qd.pulso.utilityQuarterly.current,
            utility_goal: qd.pulso.utilityQuarterly.goal
        }, { onConflict: 'quarter_key' });

        // Save rocks
        if (qd.rocks.length > 0) {
            await supabase.from('rocks').upsert(
                qd.rocks.map(r => ({
                    id: r.id, quarter_key: qk, name: r.name, owner_id: r.ownerId,
                    status: r.status, progress: r.progress, deadline: r.deadline || null,
                    milestones: r.milestones || []
                })), { onConflict: 'id' }
            );
        }

        // Save scorecard metrics
        if (qd.scorecard.metrics.length > 0) {
            await supabase.from('scorecard_metrics').upsert(
                qd.scorecard.metrics.map((m, i) => ({
                    id: m.id, quarter_key: qk, metric: m.metric, owner_id: m.ownerId,
                    goal: m.goal, direction: m.direction, sort_order: i + 1
                })), { onConflict: 'id' }
            );
        }

        // Save scorecard results
        const allResults = [];
        Object.entries(qd.scorecard.weeks).forEach(([week, metrics]) => {
            Object.entries(metrics).forEach(([metricId, data]) => {
                allResults.push({
                    id: `sr-${metricId}-${week}`,
                    metric_id: metricId, week: parseInt(week),
                    result: data.result, good: data.good
                });
            });
        });
        if (allResults.length > 0) {
            await supabase.from('scorecard_results').upsert(allResults, { onConflict: 'id' });
        }

        // Save leaderboard
        const lbEntries = Object.entries(qd.leaderboard).map(([memberId, data]) => ({
            id: `lb-${memberId}-${qk}`, member_id: memberId, quarter_key: qk,
            metric_label: data.metricLabel, metric_value: data.metricValue,
            progress: data.progress, goal: data.goal
        }));
        if (lbEntries.length > 0) {
            await supabase.from('leaderboard_entries').upsert(lbEntries, { onConflict: 'id' });
        }

        // Save fame wall
        if (qd.fameWall.length > 0) {
            await supabase.from('fame_wall').upsert(
                qd.fameWall.map(f => ({
                    id: f.id, quarter_key: qk, name: f.name, initials: f.initials,
                    retention_months: f.retentionMonths, roas: f.roas,
                    added_date: f.addedDate || null
                })), { onConflict: 'id' }
            );
        }

        syncStatus = 'connected';
    } catch (e) {
        console.error('Cloud save error:', e);
        syncStatus = 'error';
    }
    updateSyncUI();
}

function updateSyncUI() {
    const el = document.getElementById('sync-status');
    if (!el) return;
    const labels = {
        connected: 'Sincronizado',
        offline: 'Solo local',
        syncing: 'Sincronizando...',
        error: 'Error de sync'
    };
    el.innerHTML = `<span class="sync-dot ${syncStatus}"></span> ${labels[syncStatus] || syncStatus}`;
}

let state = {};

function loadState() {
    try {
        const raw = localStorage.getItem('eos_dashboard');
        if (raw) {
            state = JSON.parse(raw);
            if (!state.settings) state.settings = DEFAULT_STATE.settings;
            if (!state.quarters) state.quarters = {};
            return;
        }
    } catch (e) { console.error('Error loading state:', e); }
    // First load: use seed data
    state = JSON.parse(JSON.stringify(DEFAULT_STATE));
    const key = state.currentYear + '-Q' + state.currentQuarter;
    state.quarters[key] = getSeedQuarter();
    saveState();
}

function saveState() {
    // Always save locally (instant)
    try { localStorage.setItem('eos_dashboard', JSON.stringify(state)); }
    catch (e) { console.error('Error saving state:', e); }
    // Debounced cloud sync
    if (supabase) {
        clearTimeout(savePending);
        savePending = setTimeout(() => saveToCloud(), 1000);
    }
}

function getQuarterKey(y, q) { return y + '-Q' + q; }

function getQuarterData() {
    const key = getQuarterKey(state.currentYear, state.currentQuarter);
    if (!state.quarters[key]) {
        state.quarters[key] = getDefaultQuarter();
        saveState();
    }
    return state.quarters[key];
}

function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

function getMember(id) { return state.settings.teamMembers.find(m => m.id === id); }
function getMemberName(id) { const m = getMember(id); return m ? m.name : id; }

// =====================================================================
// ===== DATE UTILITIES =====
// =====================================================================
function getCurrentQuarterInfo() {
    const now = new Date();
    const year = now.getFullYear();
    const quarter = Math.ceil((now.getMonth() + 1) / 3);
    const qStartMonth = (quarter - 1) * 3;
    const qStart = new Date(year, qStartMonth, 1);
    const daysSinceStart = Math.floor((now - qStart) / 86400000);
    const weekInQuarter = Math.min(13, Math.max(1, Math.ceil((daysSinceStart + 1) / 7)));
    return { year, quarter, weekInQuarter };
}

function getDisplayWeek() {
    if (state.currentWeek) return state.currentWeek;
    const info = getCurrentQuarterInfo();
    if (info.year === state.currentYear && info.quarter === state.currentQuarter) {
        return info.weekInQuarter;
    }
    return 13;
}

function formatCurrency(n) {
    return '$' + n.toLocaleString('en-US');
}

function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('es-MX', { day: 'numeric', month: 'short', year: 'numeric' });
}

function isNewEntry(addedDate) {
    if (!addedDate) return false;
    const added = new Date(addedDate);
    const now = new Date();
    return (now - added) < 30 * 86400000;
}

const MONTHS_ES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

function getHeaderDate() {
    const now = new Date();
    return now.getDate() + ' ' + MONTHS_ES[now.getMonth()] + ' ' + now.getFullYear();
}

// =====================================================================
function isAdmin() {
    return localStorage.getItem('eos_admin_unlocked') === 'true';
}
function getHiddenCards() {
    try { return JSON.parse(localStorage.getItem('eos_hidden_cards') || '{}'); }
    catch { return {}; }
}
function isCardHidden(cardId) {
    return !!getHiddenCards()[cardId];
}
function toggleCardVisibility(cardId, event) {
    if (event) event.stopPropagation();
    if (!isAdmin()) { promptAdminPin(); return; }
    const hidden = getHiddenCards();
    hidden[cardId] = !hidden[cardId];
    localStorage.setItem('eos_hidden_cards', JSON.stringify(hidden));
    renderPulso();
    showToast(hidden[cardId] ? 'Tarjeta oculta para el equipo' : 'Tarjeta visible para todos');
}
function promptAdminPin() {
    const storedPin = localStorage.getItem('eos_admin_pin');
    if (!storedPin) {
        // First time: set pin
        openModal('Crear PIN de Admin', `
            <div class="form-group">
                <label>Crea un PIN de 4 dígitos para proteger las tarjetas sensibles</label>
                <input type="password" id="f-new-pin" maxlength="4" pattern="[0-9]*" inputmode="numeric" placeholder="1234" style="width:120px;text-align:center;font-size:24px;letter-spacing:8px;">
            </div>
            <p style="font-size:12px;color:var(--text-muted);margin-top:8px;">Solo tú tendrás este PIN. Se guarda en este dispositivo.</p>
        `, () => {
            const pin = document.getElementById('f-new-pin').value;
            if (pin.length !== 4) { showToast('El PIN debe ser de 4 dígitos'); return; }
            localStorage.setItem('eos_admin_pin', pin);
            localStorage.setItem('eos_admin_unlocked', 'true');
            closeModal();
            showToast('PIN creado. Modo admin activado.');
            renderPulso();
        });
        return;
    }
    // Pin exists: ask for it
    openModal('Modo Admin', `
        <div class="form-group">
            <label>Ingresa tu PIN para ver/ocultar tarjetas</label>
            <input type="password" id="f-admin-pin" maxlength="4" pattern="[0-9]*" inputmode="numeric" placeholder="••••" style="width:120px;text-align:center;font-size:24px;letter-spacing:8px;">
        </div>
    `, () => {
        const pin = document.getElementById('f-admin-pin').value;
        if (pin === localStorage.getItem('eos_admin_pin')) {
            localStorage.setItem('eos_admin_unlocked', 'true');
            closeModal();
            showToast('Modo admin activado');
            renderAll();
        } else {
            showToast('PIN incorrecto');
        }
    });
}
function lockAdmin() {
    localStorage.setItem('eos_admin_unlocked', 'false');
    renderAll();
    showToast('Modo admin bloqueado');
}

let currentModalSave = null;

function openModal(title, bodyHTML, onSave, opts = {}) {
    const overlay = document.getElementById('modal-overlay');
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').innerHTML = bodyHTML;
    const btnRow = document.getElementById('modal-buttons');
    if (opts.hideButtons) {
        btnRow.style.display = 'none';
    } else {
        btnRow.style.display = 'flex';
        const saveBtn = document.getElementById('modal-save');
        saveBtn.textContent = opts.saveText || 'Guardar';
        if (opts.saveClass === 'danger') {
            saveBtn.className = 'btn btn-danger';
        } else {
            saveBtn.className = 'btn btn-primary';
        }
    }
    currentModalSave = onSave;
    overlay.classList.add('active');
}

function closeModal() {
    document.getElementById('modal-overlay').classList.remove('active');
    currentModalSave = null;
}

document.getElementById('modal-save').addEventListener('click', () => {
    if (currentModalSave) currentModalSave();
});
document.getElementById('modal-overlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
});

// =====================================================================
// ===== GAMIFICATION ENGINE =====
// =====================================================================
const XP_PER_LEVEL = 100;
const LEVEL_TITLES = ['Novato', 'Aprendiz', 'Competente', 'Experto', 'Maestro', 'Leyenda'];
const LEVEL_COLORS = ['var(--text-muted)', 'var(--blue)', 'var(--green)', 'var(--purple)', 'var(--gold)', 'var(--gold)'];

function calculateXP(memberId) {
    const qd = getQuarterData();
    let xp = 0;
    // +10 XP per scorecard hit
    const memberMetrics = qd.scorecard.metrics.filter(m => m.ownerId === memberId);
    memberMetrics.forEach(m => {
        for (let w = 1; w <= 13; w++) {
            const wd = qd.scorecard.weeks[w] && qd.scorecard.weeks[w][m.id];
            if (wd && wd.good) xp += 10;
        }
    });
    // +25 XP per completed milestone
    qd.rocks.filter(r => r.ownerId === memberId).forEach(r => {
        (r.milestones || []).forEach(ms => { if (ms.done) xp += 25; });
    });
    // +50 XP per rock at 100%
    qd.rocks.filter(r => r.ownerId === memberId && r.progress === 100).forEach(() => { xp += 50; });
    // +15 XP per on-track rock
    qd.rocks.filter(r => r.ownerId === memberId && r.status === 'on-track').forEach(() => { xp += 15; });
    return xp;
}

function getLevel(xp) {
    const level = Math.min(LEVEL_TITLES.length - 1, Math.floor(xp / XP_PER_LEVEL));
    const xpInLevel = xp % XP_PER_LEVEL;
    return { level, title: LEVEL_TITLES[level], color: LEVEL_COLORS[level], xpInLevel, xpNeeded: XP_PER_LEVEL };
}

function calculateStreak(memberId) {
    const qd = getQuarterData();
    const memberMetrics = qd.scorecard.metrics.filter(m => m.ownerId === memberId);
    if (memberMetrics.length === 0) return 0;
    let streak = 0;
    // Count consecutive weeks (from latest) where ALL member metrics hit
    for (let w = 13; w >= 1; w--) {
        const weekData = qd.scorecard.weeks[w];
        if (!weekData) break;
        const metricsThisWeek = memberMetrics.filter(m => weekData[m.id]);
        if (metricsThisWeek.length === 0) break;
        const allHit = metricsThisWeek.every(m => weekData[m.id] && weekData[m.id].good);
        if (allHit) streak++;
        else break;
    }
    return streak;
}

function calculateBadges(memberId) {
    const qd = getQuarterData();
    const badges = [];
    const xp = calculateXP(memberId);
    const streak = calculateStreak(memberId);
    const memberRocks = qd.rocks.filter(r => r.ownerId === memberId);
    const memberMetrics = qd.scorecard.metrics.filter(m => m.ownerId === memberId);

    // Streak badges
    if (streak >= 3) badges.push({ icon: '🔥', title: 'Racha x' + streak + ' semanas' });
    if (streak >= 6) badges.push({ icon: '⚡', title: 'Imparable: 6+ semanas' });
    // Rock badges
    const completedRocks = memberRocks.filter(r => r.progress === 100).length;
    if (completedRocks >= 1) badges.push({ icon: '🏔️', title: 'Rock Crusher: ' + completedRocks + ' completados' });
    if (memberRocks.length > 0 && memberRocks.every(r => r.status === 'on-track'))
        badges.push({ icon: '🎯', title: 'Todos los Rocks on-track' });
    // XP badges
    if (xp >= 200) badges.push({ icon: '⭐', title: 'Estrella: 200+ XP' });
    if (xp >= 400) badges.push({ icon: '💎', title: 'Diamante: 400+ XP' });
    // Scorecard badges
    let totalHits = 0, totalEntries = 0;
    memberMetrics.forEach(m => {
        for (let w = 1; w <= 13; w++) {
            const wd = qd.scorecard.weeks[w] && qd.scorecard.weeks[w][m.id];
            if (wd) { totalEntries++; if (wd.good) totalHits++; }
        }
    });
    if (totalEntries >= 10 && totalHits / totalEntries >= 0.9)
        badges.push({ icon: '🏆', title: 'Elite: 90%+ hit rate' });
    return badges;
}

function getWeeklyMVP() {
    const qd = getQuarterData();
    const currentWeek = getDisplayWeek();
    const weekData = qd.scorecard.weeks[currentWeek];
    if (!weekData) return null;
    const members = state.settings.teamMembers;
    let bestMember = null, bestHitRate = -1;
    members.forEach(member => {
        const memberMetrics = qd.scorecard.metrics.filter(m => m.ownerId === member.id);
        const results = memberMetrics.map(m => weekData[m.id]).filter(Boolean);
        if (results.length === 0) return;
        const hits = results.filter(r => r.good).length;
        const rate = hits / results.length;
        if (rate > bestHitRate) { bestHitRate = rate; bestMember = { ...member, hitRate: rate, hits, total: results.length }; }
    });
    return bestMember && bestHitRate > 0 ? bestMember : null;
}

function getAvatarHTML(member, size) {
    const sz = size || 68;
    const xp = calculateXP(member.id);
    const lvl = getLevel(xp);
    const ringClass = lvl.level >= 4 ? 'gold' : lvl.level >= 3 ? 'purple' : lvl.level >= 2 ? 'green' : '';
    const photoUrl = member.photo || '';
    const inner = photoUrl
        ? `<img src="${photoUrl}" alt="${member.name}">`
        : member.avatar || member.name[0];
    return `<div class="avatar" style="width:${sz}px;height:${sz}px;background:${member.color};font-size:${Math.round(sz*0.38)}px;">
        ${inner}

    </div>`;
}

function getUnlockedRewards(memberId) {
    const xp = calculateXP(memberId);
    const streak = calculateStreak(memberId);
    const qd = getQuarterData();
    const memberRocks = qd.rocks.filter(r => r.ownerId === memberId);
    const completedRocks = memberRocks.filter(r => r.progress === 100).length;
    const memberMetrics = qd.scorecard.metrics.filter(m => m.ownerId === memberId);
    let totalHits = 0, totalEntries = 0;
    memberMetrics.forEach(m => {
        for (let w = 1; w <= 13; w++) {
            const wd = qd.scorecard.weeks[w] && qd.scorecard.weeks[w][m.id];
            if (wd) { totalEntries++; if (wd.good) totalHits++; }
        }
    });
    const hitRate = totalEntries > 0 ? totalHits / totalEntries : 0;
    const lvl = getLevel(xp);

    const unlockedSkins = REWARDS.skins.filter(s => xp >= s.req);
    const unlockedTitles = REWARDS.titles.filter(t => {
        if (xp < t.req) return false;
        if (t.condition) {
            // Evaluate condition safely
            if (t.condition === 'streak >= 3' && streak < 3) return false;
            if (t.condition === 'streak >= 4' && streak < 4) return false;
            if (t.condition === 'streak >= 6' && streak < 6) return false;
            if (t.condition === 'completedRocks >= 2' && completedRocks < 2) return false;
            if (t.condition === 'hitRate >= 0.9' && hitRate < 0.9) return false;
            if (t.condition === 'level >= 0') return true;
        }
        return true;
    });
    return { skins: unlockedSkins, titles: unlockedTitles, xp, streak, completedRocks, hitRate };
}

const SLACK_ENDPOINT = 'https://zdxdvljrhtpmkuxwlwrm.supabase.co/functions/v1/slack-notify';

function slackNotify(text) {
    fetch(SLACK_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
    }).catch(e => console.log('Slack notify error:', e));
}

// Called after saving scorecard results
function notifyScorecard(metricName, week, result, good, ownerName) {
    const emoji = good ? '✅' : '❌';
    slackNotify(`${emoji} *Scorecard S${week}* — _${metricName}_\nResultado: *${result}* ${good ? '(Hit)' : '(Miss)'}\nDueño: ${ownerName}`);
}

// Called after rock updates
function notifyRockUpdate(rockName, ownerName, progress, status) {
    const emoji = status === 'on-track' ? '🟢' : '🔴';
    const bar = '█'.repeat(Math.floor(progress/10)) + '░'.repeat(10 - Math.floor(progress/10));
    slackNotify(`🏔️ *Rock Update* — _${rockName}_\n${emoji} ${status === 'on-track' ? 'On Track' : 'Off Track'} | ${bar} ${progress}%\nDueño: ${ownerName}`);
}

// Called when rock completes
function notifyRockComplete(rockName, ownerName) {
    slackNotify(`🎉🏔️ *¡Rock Completado!* — _${rockName}_\n${ownerName} acaba de completar este Rock al 100%. ¡Felicidades! 🎊`);
}

// Called when someone unlocks a reward
function notifyRewardUnlock(memberName, rewardType, rewardName, rewardIcon) {
    const type = rewardType === 'skin' ? 'Skin' : 'Título';
    slackNotify(`🎮 *¡${type} Desbloqueado!*\n${memberName} acaba de equiparse ${rewardIcon} *${rewardName}*`);
}

// Called when someone's bonus status changes
function notifyBonusChange(memberName, newStatus) {
    if (newStatus === 'secured') {
        slackNotify(`💰 *¡Bono Asegurado!*\n${memberName} ya tiene su bono asegurado este trimestre. 🎯`);
    } else {
        slackNotify(`⚠️ *Bono en Riesgo*\n${memberName} tiene su bono en riesgo. ¡A darle con todo! 💪`);
    }
}

// Called when fame wall client is added
function notifyFameWall(clientName, retentionMonths, roas) {
    slackNotify(`🏆 *¡Nuevo Caso de Éxito!* — _${clientName}_\n📅 ${retentionMonths} meses de retención | 📈 ROAS ${roas}x\n💰 ¡$500 de bono para todo el equipo! 🎉`);
}

// Called when pulso is updated
function notifyPulso(type, current, goal) {
    const pct = (current / goal * 100).toFixed(1);
    const label = type === 'revenue' ? 'Facturación Mensual' : 'Utilidad Bruta Trimestral';
    const bar = '█'.repeat(Math.floor(pct/10)) + '░'.repeat(10 - Math.floor(pct/10));
    let emoji = pct >= 90 ? '🔥' : pct >= 70 ? '📊' : pct >= 50 ? '⚠️' : '🚨';
    slackNotify(`${emoji} *${label} Actualizada*\n${bar} *${pct}%* ($${current.toLocaleString()} / $${goal.toLocaleString()})\n${pct >= 100 ? '🎉 ¡Meta cumplida!' : `Faltan $${(goal - current).toLocaleString()}`}`);
}

// Weekly summary — call manually or on schedule
function sendWeeklySummary() {
    const qd = getQuarterData();
    const week = getDisplayWeek();
    const members = state.settings.teamMembers;
    const mvp = getWeeklyMVP();

    // Scorecard summary
    let totalHits = 0, totalEntries = 0;
    qd.scorecard.metrics.forEach(m => {
        const wd = qd.scorecard.weeks[week] && qd.scorecard.weeks[week][m.id];
        if (wd) { totalEntries++; if (wd.good) totalHits++; }
    });

    // Rocks summary
    const onTrack = qd.rocks.filter(r => r.status === 'on-track').length;
    const offTrack = qd.rocks.filter(r => r.status === 'off-track').length;

    // Revenue
    const rev = qd.pulso.revenueMonthly;
    const revPct = rev.goal > 0 ? (rev.current / rev.goal * 100).toFixed(0) : 0;

    let msg = `📋 *Resumen Semanal — S${week} Q${state.currentQuarter} ${state.currentYear}*\n\n`;
    msg += `📊 *Scorecard:* ${totalHits}/${totalEntries} métricas cumplidas (${totalEntries > 0 ? ((totalHits/totalEntries)*100).toFixed(0) : 0}%)\n`;
    msg += `🏔️ *Rocks:* ${onTrack} On Track / ${offTrack} Off Track\n`;
    msg += `💰 *Facturación:* $${rev.current.toLocaleString()} / $${rev.goal.toLocaleString()} (${revPct}%)\n`;

    if (mvp) {
        msg += `\n🏆 *MVP de la Semana:* ${mvp.name} — ${mvp.hits}/${mvp.total} hits (${(mvp.hitRate*100).toFixed(0)}%)`;
    }

    // Leaderboard
    const ranked = calculateLeaderboard();
    msg += '\n\n*Leaderboard:*\n';
    ranked.forEach(m => {
        const xp = calculateXP(m.id);
        const lvl = getLevel(xp);
        msg += `${m.rank === 1 ? '🥇' : m.rank === 2 ? '🥈' : m.rank === 3 ? '🥉' : '#' + m.rank} ${m.name} — ${lvl.title} (${xp} XP) | ${m.bonusStatus === 'secured' ? '✅ Bono' : '⚠️ En riesgo'}\n`;
    });

    msg += `\n_Dashboard:_ https://dashboard-eos.netlify.app`;
    slackNotify(msg);
    showToast('Resumen semanal enviado a Slack');
}

function showEditMember(memberId) {
    const member = getMember(memberId);
    if (!member) return;
    const photoPreview = member.photo
        ? `<img src="${member.photo}" alt="${member.name}">`
        : `<span style="color:${member.color};font-size:28px;font-weight:700;">${member.avatar}</span>`;
    const html = `
        <div class="photo-upload">
            <div class="photo-preview" id="profile-photo-preview" style="border-color:${member.color};">
                ${photoPreview}
            </div>
            <div class="photo-actions">
                <button class="photo-btn" onclick="document.getElementById('profile-photo-input').click()">Subir Foto</button>
                ${member.photo ? '<button class="photo-btn" onclick="removeProfilePhoto()">Quitar Foto</button>' : ''}
                <input type="file" id="profile-photo-input" accept="image/*" style="display:none" onchange="handleProfilePhoto(event)">
            </div>
        </div>
        <div class="form-group">
            <label>Nombre</label>
            <input type="text" id="f-edit-name" value="${member.name}">
        </div>
        <div class="form-group">
            <label>Rol / Posición</label>
            <input type="text" id="f-edit-role" value="${member.role || ''}" placeholder="Ej: Director de Ventas">
        </div>
        <div class="form-group">
            <label>Inicial (si no hay foto)</label>
            <input type="text" id="f-edit-avatar" value="${member.avatar || ''}" maxlength="2" style="width:80px;">
        </div>
        <div class="form-group">
            <label>Color del perfil</label>
            <input type="color" id="f-edit-color" value="${member.color || '#2979ff'}" style="width:60px;height:40px;padding:2px;">
        </div>
    `;
    openModal('Editar Perfil — ' + member.name, html, () => {
        member.name = document.getElementById('f-edit-name').value.trim() || member.name;
        member.role = document.getElementById('f-edit-role').value.trim();
        member.avatar = document.getElementById('f-edit-avatar').value.trim().toUpperCase() || member.name[0];
        member.color = document.getElementById('f-edit-color').value;
        if (window._pendingPhoto !== undefined) {
            member.photo = window._pendingPhoto;
            delete window._pendingPhoto;
        }
        saveState(); renderAll(); closeModal();
        showToast('Perfil actualizado');
    });
}

function handleProfilePhoto(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        // Resize to max 150x150 to keep localStorage/Supabase small
        const img = new Image();
        img.onload = function() {
            const canvas = document.createElement('canvas');
            const maxSize = 150;
            let w = img.width, h = img.height;
            if (w > h) { h = maxSize * h / w; w = maxSize; }
            else { w = maxSize * w / h; h = maxSize; }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
            window._pendingPhoto = dataUrl;
            document.getElementById('profile-photo-preview').innerHTML = `<img src="${dataUrl}">`;
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

function removeProfilePhoto() {
    window._pendingPhoto = '';
    document.getElementById('profile-photo-preview').innerHTML = '<span style="font-size:28px;">👤</span>';
}

// ===== BUSINESS LOGIC =====
// =====================================================================
function calculateLeaderboard() {
    const qd = getQuarterData();
    const members = state.settings.teamMembers;
    const ranked = members.map(member => {
        const lb = qd.leaderboard[member.id] || {};
        // Scorecard hit rate
        const memberMetrics = qd.scorecard.metrics.filter(m => m.ownerId === member.id);
        let totalHits = 0, totalEntries = 0;
        memberMetrics.forEach(m => {
            for (let w = 1; w <= 13; w++) {
                const wd = qd.scorecard.weeks[w] && qd.scorecard.weeks[w][m.id];
                if (wd) { totalEntries++; if (wd.good) totalHits++; }
            }
        });
        const hitRate = totalEntries > 0 ? totalHits / totalEntries : 0;
        // Rock progress
        const memberRocks = qd.rocks.filter(r => r.ownerId === member.id);
        const avgRockProgress = memberRocks.length > 0
            ? memberRocks.reduce((sum, r) => sum + r.progress, 0) / memberRocks.length : 0;
        // Composite
        const compositeScore = (hitRate * 60) + (avgRockProgress * 0.4);
        const bonusStatus = (hitRate >= 0.8 && avgRockProgress >= 70) ? 'secured' : 'at-risk';
        return { ...member, ...lb, hitRate, avgRockProgress, compositeScore, bonusStatus };
    });
    ranked.sort((a, b) => b.compositeScore - a.compositeScore);
    ranked.forEach((m, i) => m.rank = i + 1);
    return ranked;
}

function calculateRocksSummary() {
    const qd = getQuarterData();
    const onTrack = qd.rocks.filter(r => r.status === 'on-track').length;
    const offTrack = qd.rocks.filter(r => r.status === 'off-track').length;
    return { onTrack, offTrack, total: qd.rocks.length };
}

function navQuarter(delta) {
    state.currentQuarter += delta;
    if (state.currentQuarter > 4) { state.currentQuarter = 1; state.currentYear++; }
    if (state.currentQuarter < 1) { state.currentQuarter = 4; state.currentYear--; }
    state.currentWeek = null;
    saveState(); renderAll();
}

function navWeek(delta) {
    let w = getDisplayWeek() + delta;
    if (w < 1) w = 1;
    if (w > 13) w = 13;
    state.currentWeek = w;
    saveState(); renderHeader(); renderScorecard();
}

// =====================================================================
// ===== RENDER: SCORECARD =====
// =====================================================================
function renderScorecard() {
    const qd = getQuarterData();
    const metrics = qd.scorecard.metrics;
    const weeks = qd.scorecard.weeks;
    const currentWeek = getDisplayWeek();

    if (metrics.length === 0) {
        document.getElementById('section-scorecard').innerHTML = `
            <div class="section-header">
                <div class="section-title"><span class="dot" style="background:var(--blue);"></span> Scorecard del Equipo</div>
                <button class="add-btn" onclick="showEditScorecardMetric(null)">+ Métrica</button>
            </div>
            <div class="empty-state"><div class="empty-icon">&#9776;</div><p>No hay métricas configuradas</p><button class="add-btn" onclick="showEditScorecardMetric(null)">+ Crear Métrica</button></div>
        `;
        return;
    }

    let headerHTML = '<tr><th class="sticky col-num">#</th><th class="sticky col-metric">Métrica</th><th class="sticky col-owner">Dueño</th><th class="sticky col-goal">Meta</th>';
    for (let w = 1; w <= 13; w++) {
        headerHTML += `<th class="col-week ${w === currentWeek ? 'current-week' : ''}">S${w}</th>`;
    }
    headerHTML += '<th class="col-total">Total</th></tr>';

    let bodyHTML = '';
    metrics.forEach((m, i) => {
        let hits = 0, total = 0;
        let weekCells = '';
        for (let w = 1; w <= 13; w++) {
            const wd = weeks[w] && weeks[w][m.id];
            const isCurrent = w === currentWeek;
            if (wd) {
                total++;
                if (wd.good) hits++;
                weekCells += `<td class="week-cell ${wd.good ? 'hit' : 'miss'} ${isCurrent ? 'current-week-col' : ''}" onclick="showEditWeekResult('${m.id}', ${w})" title="S${w}: ${wd.result}">&bull;</td>`;
            } else {
                weekCells += `<td class="week-cell empty ${isCurrent ? 'current-week-col' : ''}" onclick="showEditWeekResult('${m.id}', ${w})" title="S${w}: Sin dato">&mdash;</td>`;
            }
        }
        const totalColor = total > 0 ? (hits / total >= 0.7 ? 'var(--green)' : 'var(--red)') : 'var(--text-muted)';
        bodyHTML += `<tr>
            <td class="sticky col-num">${i + 1}</td>
            <td class="sticky col-metric"><span class="metric-name-link" onclick="showEditScorecardMetric('${m.id}')">${m.metric}</span></td>
            <td class="sticky col-owner">${getMemberName(m.ownerId)}</td>
            <td class="sticky col-goal">${m.goal}</td>
            ${weekCells}
            <td class="total-cell" style="color:${totalColor};">${total > 0 ? `${hits}/${total}` : '—'}</td>
        </tr>`;
    });

    document.getElementById('section-scorecard').innerHTML = `
        <div class="section-header">
            <div class="section-title"><span class="dot" style="background:var(--blue);"></span> Scorecard del Equipo — Q${state.currentQuarter} ${state.currentYear}</div>
            <button class="add-btn" onclick="showEditScorecardMetric(null)">+ Métrica</button>
        </div>
        <div class="table-wrapper">
            <table class="scorecard-table">
                <thead>${headerHTML}</thead>
                <tbody>${bodyHTML}</tbody>
            </table>
        </div>
    `;
}

// ===== RENDER: LEADERBOARD =====
// =====================================================================
function renderLeaderboard() {
    const ranked = calculateLeaderboard();
    if (ranked.length === 0) {
        document.getElementById('section-leaderboard').innerHTML = `
            <div class="section-header">
                <div class="section-title"><span class="dot" style="background:var(--purple);"></span> Leaderboard de Rendimiento Individual</div>
            </div>
            <div class="empty-state"><div class="empty-icon">&#128101;</div><p>No hay miembros del equipo</p></div>
        `;
        return;
    }

    // Weekly MVP Banner
    const mvp = getWeeklyMVP();
    const mvpHTML = mvp ? `
        <div class="mvp-banner">
            <div class="mvp-trophy">🏆</div>
            <div class="mvp-avatar" style="background:${mvp.color};">
                ${mvp.photo ? `<img src="${mvp.photo}" alt="${mvp.name}">` : mvp.avatar}
            </div>
            <div class="mvp-info">
                <div class="mvp-title">MVP de la Semana S${getDisplayWeek()} — ${mvp.name}</div>
                <div class="mvp-desc">${mvp.hits}/${mvp.total} métricas cumplidas (${(mvp.hitRate*100).toFixed(0)}%) esta semana</div>
            </div>
        </div>` : '';

    const cards = ranked.map(m => {
        const progressColor = m.bonusStatus === 'secured' ? 'var(--gradient-green)' : 'var(--gradient-red)';
        const hitPct = (m.hitRate * 100).toFixed(0);
        const xp = calculateXP(m.id);
        const lvl = getLevel(xp);
        const streak = calculateStreak(m.id);
        const badges = calculateBadges(m.id);

function getRAMSections() {
    if (!state.ramSections) state.ramSections = JSON.parse(JSON.stringify(DEFAULT_RAM_SECTIONS));
    return state.ramSections;
}

function getRAMMonth() {
    if (!state.ram) state.ram = {};
    const year = state.ramYear || new Date().getFullYear();
    const month = state.ramMonth !== undefined ? state.ramMonth : new Date().getMonth();
    const key = `${year}-${month}`;
    if (!state.ram[key]) state.ram[key] = {};
    return state.ram[key];
}

function rv(metricId, field) {
    const d = getRAMMonth();
    return d[`${metricId}_${field}`] !== undefined ? d[`${metricId}_${field}`] : null;
}

function sv(metricId, field, value) {
    const d = getRAMMonth();
    d[`${metricId}_${field}`] = value;
    saveState();
}

function calcMonthlyActual(metricId, metricType) {
    const weeks = [];
    for (let w = 1; w <= 5; w++) {
        const v = rv(metricId, `w${w}`);
        if (v !== null && v !== '' && !isNaN(parseFloat(v))) weeks.push(parseFloat(v));
    }
    if (weeks.length === 0) return null;
    if (metricType === 'avg') return weeks.reduce((a,b) => a+b, 0) / weeks.length;
    return weeks.reduce((a,b) => a+b, 0);
}

function fmtRAM(value, format) {
    if (value === null || value === undefined || value === '') return '—';
    const n = parseFloat(value);
    if (isNaN(n)) return String(value);
    if (format === '$') {
        if (Math.abs(n) >= 1000) return '$' + (n/1000).toFixed(2) + 'K';
        return '$' + n.toFixed(2);
    }
    if (format === '%') return n.toFixed(2) + '%';
    return n % 1 === 0 ? n.toString() : n.toFixed(2);
}

function getStatusColor(metricId, metric) {
    const status = rv(metricId, 'status');
    if (status) return status;
    const actual = calcMonthlyActual(metricId, metric.type);
    const target = parseFloat(rv(metricId, 'target'));
    if (actual === null || isNaN(target) || target === 0) return '';
    const ratio = actual / target;
    if (metric.lowerIsBetter) {
        if (actual <= target) return 'green';
        if (actual <= target * 1.15) return 'yellow';
        return 'red';
    }
    if (ratio >= 0.95) return 'green';
    if (ratio >= 0.85) return 'light-green';
    if (ratio >= 0.7) return 'yellow';
    return 'red';
}

function statusBadge(color) {
    const colors = {
        'green': { bg: 'var(--green)', label: 'Green' },
        'light-green': { bg: '#66bb6a', label: 'Light Green' },
        'yellow': { bg: 'var(--yellow)', label: 'Yellow' },
        'red': { bg: 'var(--red)', label: 'Red' },
    };
    const c = colors[color];
    if (!c) return '';
    return `<span style="background:${c.bg};color:#fff;padding:2px 10px;border-radius:4px;font-size:11px;font-weight:700;">${c.label}</span>`;
}

            <div class="form-group"><label>Notes (Week 3-4)</label><textarea id="f-rnote2" rows="2" style="width:100%;padding:8px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--text);resize:vertical;">${note2}</textarea></div>
        </div>
        <div style="margin-top:10px;padding:10px;background:rgba(255,255,255,.03);border-radius:8px;">
            <span style="color:var(--text-muted);font-size:12px;">Type: <strong>${metricType === 'avg' ? 'Average' : 'Total'}</strong> — Monthly Actual is calculated automatically</span>
        </div>
    `, () => {
        const fields = {w1:'f-rw1',w2:'f-rw2',w3:'f-rw3',w4:'f-rw4',w5:'f-rw5',target:'f-rtarget'};
        for (const [k,id] of Object.entries(fields)) {
            const v = document.getElementById(id).value;
            sv(metricId, k, v !== '' ? parseFloat(v) : null);
        }
        sv(metricId, 'status', document.getElementById('f-rstatus').value);
        sv(metricId, 'owner', document.getElementById('f-rowner').value);
        sv(metricId, 'source', document.getElementById('f-rsource').value);
        sv(metricId, 'note1', document.getElementById('f-rnote1').value);
        sv(metricId, 'note2', document.getElementById('f-rnote2').value);
        closeModal();
        renderRAM();
    });
}

// --- RENDER ---
function renderRAM() {
    if (!isAdmin()) {
        document.getElementById('section-ram').innerHTML = `
            <div class="empty-state" style="padding:80px 20px;">
                <div class="empty-icon">🔒</div>
                <p style="font-size:18px;margin-bottom:12px;">CEO Dashboard — Restricted Access</p>
                <p style="color:var(--text-muted);margin-bottom:20px;">Enter your admin PIN to view this data.</p>
                <button class="btn btn-primary" onclick="promptAdminPin()">Enter PIN</button>
            </div>`;
        return;
    }
    const year = state.ramYear || new Date().getFullYear();
    const month = state.ramMonth !== undefined ? state.ramMonth : new Date().getMonth();
    const currentMonth = new Date().getMonth();
    const currentYear = new Date().getFullYear();
    const sections = getRAMSections();
    const editMode = state.ramEditMode || false;

    // Month tabs
    let monthTabs = '';
    for (let m = 0; m < 12; m++) {
        const isActive = m === month;
        const isCurrent = m === currentMonth && year === currentYear;
        monthTabs += `<button class="view-tab ${isActive ? 'active' : ''}"
            onclick="state.ramMonth=${m};saveState();renderRAM();"
            style="${isCurrent && !isActive ? 'border:1px solid var(--blue);' : ''}"
            >${MONTHS_SHORT[m]}</button>`;
    }

    // Table rows
    let rows = '';
    sections.forEach((section, secIdx) => {
        rows += `<tr class="section-row">
            <td colspan="12" style="border-left:3px solid ${section.color};">
                ${editMode ? `<span style="cursor:pointer;" onclick="event.stopPropagation();showEditSection(${secIdx})">${section.name} ✏️</span>` : section.name}
                ${editMode ? `<button class="add-btn" style="float:right;font-size:11px;padding:2px 10px;" onclick="event.stopPropagation();showAddMetric(${secIdx})">+ Metric</button>` : ''}
            </td>
        </tr>`;
        section.metrics.forEach((metric, metIdx) => {
            const w1 = rv(metric.id, 'w1');
            const w2 = rv(metric.id, 'w2');
            const w3 = rv(metric.id, 'w3');
            const w4 = rv(metric.id, 'w4');
            const w5 = rv(metric.id, 'w5');
            const target = rv(metric.id, 'target');
            const actual = calcMonthlyActual(metric.id, metric.type);
            const owner = rv(metric.id, 'owner') || '';
            const note1 = rv(metric.id, 'note1') || '';
            const statusColor = getStatusColor(metric.id, metric);
            const typeLabel = metric.type === 'avg' ? 'Avg' : 'Total';

            rows += `<tr class="editable" onclick="showEditRAMRow('${metric.id}','${metric.name.replace(/'/g,"\\'")}','${metric.format}','${metric.type}')">
                <td class="metric-name">
                    ${editMode ? `<span onclick="event.stopPropagation();showEditMetricDef(${secIdx},${metIdx})" style="cursor:pointer;" title="Edit definition">✏️</span> ` : ''}
                    ${metric.name}
                </td>
                <td class="month-cell">${fmtRAM(w1, metric.format)}</td>
                <td class="month-cell">${fmtRAM(w2, metric.format)}</td>
                <td class="month-cell">${fmtRAM(w3, metric.format)}</td>
                <td class="month-cell">${fmtRAM(w4, metric.format)}</td>
                <td class="month-cell" style="border-right:2px solid var(--border);">${fmtRAM(w5, metric.format)}</td>
                <td class="month-cell" style="font-size:11px;color:var(--text-muted);">${typeLabel}</td>
                <td class="month-cell actual-cell" style="font-weight:700;font-size:14px;">${fmtRAM(actual, metric.format)}</td>
                <td class="month-cell plan-cell">${fmtRAM(target, metric.format)}</td>
                <td class="month-cell" style="text-align:center;">${statusBadge(statusColor)}</td>
                <td class="month-cell" style="font-size:11px;color:var(--text-muted);">${owner}</td>
                <td class="month-cell" style="font-size:11px;color:var(--text-muted);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${note1}">${note1 ? '📝' : ''}</td>
            </tr>`;
        });
    });

    document.getElementById('section-ram').innerHTML = `
        <div class="section-header" style="flex-wrap:wrap;gap:12px;">
            <div class="section-title" style="gap:12px;">
                <span class="dot" style="background:var(--purple);"></span>
                CEO Dashboard
                <span class="ram-year-badge">${year}</span>
                <button class="nav-btn" onclick="navRAMYear(-1)">&larr;</button>
                <button class="nav-btn" onclick="navRAMYear(1)">&rarr;</button>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
                <button class="add-btn" onclick="toggleRAMEditMode()" style="${editMode ? 'background:var(--blue-bg);border-color:var(--blue);' : ''}">
                    ${editMode ? '✓ Done Editing' : '⚙ Edit Metrics'}
                </button>
                ${editMode ? '<button class="add-btn" onclick="showAddSection()">+ Section</button>' : ''}
                <div class="ram-admin-lock unlocked" onclick="lockAdmin()">🔓 Admin</div>
            </div>
        </div>
        <div style="margin-bottom:14px;">
            <div class="view-switcher" style="flex-wrap:wrap;">${monthTabs}</div>
        </div>
        <div style="margin-bottom:10px;display:flex;align-items:center;gap:16px;">
            <h2 style="font-size:20px;font-weight:800;margin:0;">${MONTHS_FULL[month]} / ${year}</h2>
            <span style="color:var(--text-muted);font-size:13px;">${editMode ? 'Click ✏️ to rename, reorder or delete metrics & sections' : 'Click any row to edit weekly data, target, status & notes'}</span>
        </div>
        <div class="ram-container" style="max-height: calc(100vh - 260px); overflow-y: auto;">
            <table class="ram-table">
                <thead>
                    <tr>
                        <th style="min-width:200px;">Metric</th>
                        <th style="text-align:center;">W1</th>
                        <th style="text-align:center;">W2</th>
                        <th style="text-align:center;">W3</th>
                        <th style="text-align:center;">W4</th>
                        <th style="text-align:center;border-right:2px solid var(--border);">Rem</th>
                        <th style="text-align:center;font-size:10px;">Type</th>
                        <th style="text-align:center;color:var(--green);">Actual</th>
                        <th style="text-align:center;color:var(--blue);">Target</th>
                        <th style="text-align:center;">Status</th>
                        <th style="text-align:center;">Owner</th>
                        <th style="text-align:center;">Notes</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
        </div>
    `;
}

function toggleRAMEditMode() {
    state.ramEditMode = !state.ramEditMode;
    renderRAM();
}

function navRAMYear(delta) {
    if (!state.ramYear) state.ramYear = new Date().getFullYear();
    state.ramYear += delta;
    saveState();
    renderRAM();
}

// =====================================================================
// ===== VIEW SWITCHING =====
// =====================================================================
function switchView(view) {
    if (view === 'ram' && !isAdmin()) {
        promptAdminPin();
        return;
    }
    state.currentView = view;
    document.getElementById('view-eos').style.display = view === 'eos' ? 'block' : 'none';
    document.getElementById('view-ram').style.display = view === 'ram' ? 'block' : 'none';
    renderHeader();
    if (view === 'ram') renderRAM();
    saveState();
}

// =====================================================================
// ===== RENDER ALL =====
// =====================================================================
function renderAll() {
    renderHeader();
    const view = state.currentView || 'eos';
    document.getElementById('view-eos').style.display = view === 'eos' ? 'block' : 'none';
    document.getElementById('view-ram').style.display = view === 'ram' ? 'block' : 'none';
    if (view === 'eos') {
        renderSetupBanner();
        renderPulso();
        renderScorecard();
        renderLeaderboard();
        renderFameWall();
    } else {
        renderRAM();
    }
    updateSyncUI();
}

    if (e.key === 'eos_dashboard') {
